trigger:
  branches:
    include:
      - main
  paths:
    include:
      - packages/http-client-csharp/

pr: none

parameters:
  - name: CreateAzureSdkForNetPR
    displayName: Create PR for azure-sdk-for-net
    type: boolean
    default: false

  - name: RegenerateAzureLibraries
    displayName: Regenerate Azure data plane SDK libraries (builds Azure emitter locally)
    type: boolean
    default: false

  - name: RegenerateMgmtLibraries
    displayName: Regenerate Azure mgmt SDK libraries (builds mgmt emitter locally)
    type: boolean
    default: false

  - name: SdkRegenerationJobCount
    displayName: Number of parallel Azure SDK regeneration jobs
    type: number
    default: 18

  - name: RunTests
    displayName: Run unit tests
    type: boolean
    default: true

  - name: UseTypeSpecNext
    displayName: Use TypeSpec Next (update dependencies to @next versions)
    type: boolean
    default: false

  # Primary Node.js version used by the artifact-emitting Build_linux job. Must match
  # the PrimaryNodeVersion default in eng/emitters/pipelines/templates/stages/emitter-stages.yml.
  - name: PrimaryNodeVersion
    type: string
    default: "24.x"

extends:
  template: /eng/common/pipelines/templates/1es-redirect.yml

  parameters:
    stages:
      - template: /eng/emitters/pipelines/templates/stages/emitter-stages.yml
        parameters:
          BuildPrereleaseVersion: true
          UseTypeSpecNext: ${{ or(parameters.UseTypeSpecNext, eq(variables['Build.Reason'], 'Schedule')) }}
          Publish: ${{replace(replace('True',eq(variables['Build.SourceBranchName'], 'main'), 'public'),'True','internal')}}
          PublishDependsOnTest: ${{ parameters.RunTests }}
          PackagePath: /packages/http-client-csharp
          EmitterPackageJsonPath: packages/http-client-csharp/package.json
          PrimaryNodeVersion: ${{ parameters.PrimaryNodeVersion }}
          Packages:
            - name: typespec-http-client-csharp
              file: typespec-http-client-csharp-*.tgz
              type: npm
            - name: Microsoft.TypeSpec.Generator
              file: Microsoft.TypeSpec.Generator.*.nupkg
              type: nuget
            - name: Microsoft.TypeSpec.Generator.ClientModel
              file: Microsoft.TypeSpec.Generator.ClientModel.*.nupkg
              type: nuget
            - name: Microsoft.TypeSpec.Generator.Input
              file: Microsoft.TypeSpec.Generator.Input.*.nupkg
              type: nuget
            - name: Microsoft.TypeSpec.Generator.Customization
              file: Microsoft.TypeSpec.Generator.Customization.*.nupkg
              type: nuget
          ${{ if parameters.RunTests }}:
            UnitTestArgs: -UnitTests
          StagePrefix: "CSharp"
          LanguageShortName: "csharp"
          HasNugetPackages: true
          CadlRanchName: "@typespec/http-client-csharp"
          UploadPlaygroundBundle: true
          PlaygroundBundleBuildScript: "build:emitter"
          PlaygroundServerDockerfile: "playground-server/Dockerfile"
          PlaygroundServerAppName: "csharp-playground-server"
          AdditionalInitializeSteps:
            - task: UseDotNet@2
              inputs:
                displayName: "Install .NET 8"
                performMultiLevelLookup: true
                useGlobalJson: false
                version: 8.x
                workingDirectory: $(Build.SourcesDirectory)/packages/http-client-csharp
            - task: UseDotNet@2
              inputs:
                displayName: "Install .NET 9"
                performMultiLevelLookup: true
                useGlobalJson: false
                version: 9.x
                workingDirectory: $(Build.SourcesDirectory)/packages/http-client-csharp
            - task: UseDotNet@2
              inputs:
                displayName: "Install .NET 10"
                performMultiLevelLookup: true
                useGlobalJson: true
                workingDirectory: $(Build.SourcesDirectory)/packages/http-client-csharp

      - stage: CreateAzureSdkForNetPR
        displayName: Create PR for azure-sdk-for-net
        dependsOn:
          - CSharp_Publish
          - CSharp_Build
        condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), or(eq(variables['Build.SourceBranchName'], 'main'), and(eq(variables['Build.Reason'], 'Manual'), ${{ parameters.CreateAzureSdkForNetPR }})))
        variables:
          PackageVersion: $[ stageDependencies.CSharp_Build.Build_linux_${{ split(parameters.PrimaryNodeVersion, '.')[0] }}.outputs['ci_build.emitterVersion'] ]
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        jobs:
          - ${{ if or(parameters.RegenerateAzureLibraries, parameters.RegenerateMgmtLibraries) }}:
              - job: PrepareSdkRegeneration
                displayName: Prepare SDK regeneration
                steps:
                  - checkout: none
                  - pwsh: |
                      $remote = "https://github.com/Azure/azure-sdk-for-net.git"
                      $commit = (git ls-remote $remote refs/heads/main).Split()[0]
                      if ($commit -notmatch "^[0-9a-f]{40}$") {
                        throw "Failed to resolve Azure SDK main commit from $remote"
                      }
                      Write-Host "Pinned Azure SDK commit: $commit"
                      Write-Host "##vso[task.setvariable variable=AzureSdkCommit;isOutput=true]$commit"
                    name: resolve
                    displayName: Pin Azure SDK commit

              - job: GenerateSdkChanges
                displayName: Generate Azure SDK changes
                dependsOn: PrepareSdkRegeneration
                timeoutInMinutes: 90
                strategy:
                  parallel: ${{ parameters.SdkRegenerationJobCount }}
                variables:
                  AzureSdkCommit: $[ dependencies.PrepareSdkRegeneration.outputs['resolve.AzureSdkCommit'] ]
                steps:
                  - template: /packages/http-client-csharp/eng/pipeline/steps/prepare-azure-sdk-for-net.yml
                    parameters:
                      PackageVersion: $(PackageVersion)
                      UseTypeSpecNext: ${{ parameters.UseTypeSpecNext }}

                  - task: PowerShell@2
                    displayName: Regenerate SDK shard
                    inputs:
                      pwsh: true
                      filePath: $(Build.SourcesDirectory)/packages/http-client-csharp/eng/scripts/Submit-AzureSdkForNetPr.ps1
                      workingDirectory: $(Build.SourcesDirectory)/packages/http-client-csharp
                      arguments: >
                        -PackageVersion '$(PackageVersion)'
                        -TypeSpecCommitUrl '$(Build.Repository.Uri)/commit/$(Build.SourceVersion)'
                        -TypeSpecSourcePackageJsonPath '$(Build.SourcesDirectory)/packages/http-client-csharp/package.json'
                        -AzureSdkCommit '$(AzureSdkCommit)'
                        -ShardIndex '$(System.JobPositionInPhase)'
                        -ShardCount '$(System.TotalJobsInPhase)'
                        -SdkPatchOutputPath '$(Build.ArtifactStagingDirectory)/sdk-changes.patch'
                        ${{ replace(replace('True', eq(variables['Build.SourceBranchName'], 'main'), ''), 'True', '-Internal') }}
                        ${{ replace(replace('True', eq(parameters.RegenerateAzureLibraries, false), ''), 'True', '-RegenerateAzureLibraries') }}
                        ${{ replace(replace('True', eq(parameters.RegenerateMgmtLibraries, false), ''), 'True', '-RegenerateMgmtLibraries') }}
                        -BuildArtifactsPath '$(Pipeline.Workspace)/build_artifacts_csharp/packages'
                        -UseTypeSpecNext:$${{ parameters.UseTypeSpecNext }}
                        -BuildReason '$(Build.Reason)'

                  - task: 1ES.PublishPipelineArtifact@1
                    displayName: Publish SDK shard patch
                    inputs:
                      path: $(Build.ArtifactStagingDirectory)/sdk-changes.patch
                      artifact: sdk_regen_$(System.JobPositionInPhase)

                  - pwsh: |
                      Remove-Item "$(Build.SourcesDirectory)/packages/http-client-csharp/.npmrc" -Force -ErrorAction SilentlyContinue
                    displayName: Cleanup .npmrc
                    condition: always()

          - job: CreatePR
            timeoutInMinutes: 90
            ${{ if or(parameters.RegenerateAzureLibraries, parameters.RegenerateMgmtLibraries) }}:
              dependsOn:
                - PrepareSdkRegeneration
                - GenerateSdkChanges
            variables:
              ${{ if or(parameters.RegenerateAzureLibraries, parameters.RegenerateMgmtLibraries) }}:
                AzureSdkCommit: $[ dependencies.PrepareSdkRegeneration.outputs['resolve.AzureSdkCommit'] ]
              # Redirect temp and cache directories to Agent.TempDirectory (a separate, larger partition)
              # to avoid running out of disk space on the root partition during generation
              TMPDIR: $(Agent.TempDirectory)
              NUGET_PACKAGES: $(Agent.TempDirectory)/nuget
              npm_config_cache: $(Agent.TempDirectory)/npm-cache
            steps:
              - template: /packages/http-client-csharp/eng/pipeline/steps/prepare-azure-sdk-for-net.yml
                parameters:
                  PackageVersion: $(PackageVersion)
                  UseTypeSpecNext: ${{ parameters.UseTypeSpecNext }}

              - pwsh: |
                  # Determine the TypeSpec PR URL 
                  $repoUrl = '$(Build.Repository.Uri)'.TrimEnd('/')
                  $commitSha = '$(Build.SourceVersion)'
                  $typeSpecCommitUrl = "$repoUrl/commit/$commitSha"

                  # Compute the URL to this pipeline run for inclusion in the generated PR
                  $collectionUri = '$(System.CollectionUri)'.TrimEnd('/')
                  $teamProject = '$(System.TeamProject)'
                  $buildId = '$(Build.BuildId)'
                  $pipelineRunUrl = "$collectionUri/$teamProject/_build/results?buildId=$buildId&view=results"

                  Write-Host "Commit SHA: $commitSha"
                  Write-Host "TypeSpec Commit URL: $typeSpecCommitUrl"
                  Write-Host "Pipeline Run URL: $pipelineRunUrl"
                  Write-Host "##vso[task.setvariable variable=TypeSpecCommitUrl]$typeSpecCommitUrl"
                  Write-Host "##vso[task.setvariable variable=PipelineRunUrl]$pipelineRunUrl"
                displayName: Set variables for PR creation

              - pwsh: |
                  Write-Host "##[section]Checking npm configuration before PR submission..."
                  Write-Host "Current npm registry:"
                  npm config get registry

                  Write-Host "`nChecking for .npmrc files:"
                  $npmrcPath = "$(Build.SourcesDirectory)/packages/http-client-csharp/.npmrc"
                  if (Test-Path $npmrcPath) {
                    Write-Host "Found .npmrc at: $npmrcPath"
                  } else {
                    Write-Host ".npmrc file not found - will use default npm registry"
                  }

                  Write-Host "`nNpm config list (user + global):"
                  npm config list
                displayName: "Log npm configuration"
                condition: eq(${{ parameters.CreateAzureSdkForNetPR }}, true)

              - ${{ if or(parameters.RegenerateAzureLibraries, parameters.RegenerateMgmtLibraries) }}:
                  - task: DownloadPipelineArtifact@2
                    displayName: Download SDK regeneration patches
                    inputs:
                      buildType: current
                      itemPattern: "**/*.patch"
                      targetPath: $(Pipeline.Workspace)/sdk_regen

              - template: /eng/common/pipelines/templates/steps/login-to-github.yml
                parameters:
                  TokenOwners:
                    - Azure

              - ${{ if or(parameters.RegenerateAzureLibraries, parameters.RegenerateMgmtLibraries) }}:
                  - task: AzureCLI@2
                    displayName: Aggregate SDK changes & create PR in azure-sdk-for-net
                    inputs:
                      azureSubscription: "AzureSDKEngKeyVault Secrets"
                      scriptType: pscore
                      scriptLocation: scriptPath
                      scriptPath: $(Build.SourcesDirectory)/packages/http-client-csharp/eng/scripts/Submit-AzureSdkForNetPr.ps1
                      arguments: >
                        -PackageVersion '$(PackageVersion)'
                        -TypeSpecCommitUrl '$(TypeSpecCommitUrl)'
                        -AuthToken '$(GH_TOKEN)'
                        -TypeSpecSourcePackageJsonPath '$(Build.SourcesDirectory)/packages/http-client-csharp/package.json'
                        -PipelineRunUrl '$(PipelineRunUrl)'
                        -AzureSdkCommit '$(AzureSdkCommit)'
                        -SdkPatchDirectory '$(Pipeline.Workspace)/sdk_regen'
                        -SkipSdkRegeneration
                        ${{ replace(replace('True', eq(variables['Build.SourceBranchName'], 'main'), ''), 'True', '-Internal') }}
                        ${{ replace(replace('True', eq(parameters.RegenerateAzureLibraries, false), ''), 'True', '-RegenerateAzureLibraries') }}
                        ${{ replace(replace('True', eq(parameters.RegenerateMgmtLibraries, false), ''), 'True', '-RegenerateMgmtLibraries') }}
                        -BuildArtifactsPath '$(Pipeline.Workspace)/build_artifacts_csharp/packages'
                        -UseTypeSpecNext:$${{ parameters.UseTypeSpecNext }}
                        -BuildReason '$(Build.Reason)'

              - ${{ else }}:
                  - task: AzureCLI@2
                    displayName: Generate emitter-package.json files & create PR in azure-sdk-for-net
                    inputs:
                      azureSubscription: "AzureSDKEngKeyVault Secrets"
                      scriptType: pscore
                      scriptLocation: scriptPath
                      scriptPath: $(Build.SourcesDirectory)/packages/http-client-csharp/eng/scripts/Submit-AzureSdkForNetPr.ps1
                      arguments: >
                        -PackageVersion '$(PackageVersion)'
                        -TypeSpecCommitUrl '$(TypeSpecCommitUrl)'
                        -AuthToken '$(GH_TOKEN)'
                        -TypeSpecSourcePackageJsonPath '$(Build.SourcesDirectory)/packages/http-client-csharp/package.json'
                        -PipelineRunUrl '$(PipelineRunUrl)'
                        ${{ replace(replace('True', eq(variables['Build.SourceBranchName'], 'main'), ''), 'True', '-Internal') }}
                        -BuildArtifactsPath '$(Pipeline.Workspace)/build_artifacts_csharp/packages'
                        -UseTypeSpecNext:$${{ parameters.UseTypeSpecNext }}
                        -BuildReason '$(Build.Reason)'

              - pwsh: |
                  $npmrcPath = "$(Build.SourcesDirectory)/packages/http-client-csharp/.npmrc"
                  if (Test-Path $npmrcPath) {
                    Remove-Item $npmrcPath -Force
                    Write-Host "Cleaned up .npmrc file"
                  }
                displayName: Cleanup .npmrc file
                condition: always()
