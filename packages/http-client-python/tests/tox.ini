[tox]
envlist = test-{azure,unbranded}, lint-{azure,unbranded}, mypy-{azure,unbranded}, pyright-{azure,unbranded}, unittest
skipsdist = True
isolated_build = True
requires = tox-uv

[testenv]
deps =
    -r {toxinidir}/requirements/base.txt
setenv =
    PYTHONPATH = {toxinidir}/../generator
    FLAVOR = {envname}
passenv =
    FOLDER
allowlist_externals = bash

# =============================================================================
# Test environments
# =============================================================================

[testenv:test-azure]
description = Run tests for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    {[testenv]deps}
    -r {toxinidir}/requirements/azure.txt
    -e {toxinidir}/../generator
commands =
    bash -c "uv pip install --no-deps {toxinidir}/../generator/test/azure/generated/*"
    pytest mock_api/azure mock_api/shared -v {posargs}

[testenv:test-unbranded]
description = Run tests for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    {[testenv]deps}
    -r {toxinidir}/requirements/unbranded.txt
    -e {toxinidir}/../generator
commands =
    bash -c "uv pip install --no-deps {toxinidir}/../generator/test/unbranded/generated/*"
    pytest mock_api/unbranded mock_api/shared -v {posargs}

[testenv:unittest]
description = Run unit tests for pygen internals
deps =
    {[testenv]deps}
    -r {toxinidir}/requirements/unbranded.txt
    -e {toxinidir}/../generator
commands =
    bash -c "uv pip install --no-deps {toxinidir}/../generator/test/unbranded/generated/special-words"
    pytest unit/ -v {posargs}

# =============================================================================
# Lint environments
# =============================================================================

[testenv:lint-azure]
description = Run linting for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {toxinidir}/requirements/lint.txt
    -e {toxinidir}/../generator
commands =
    uv pip install azure-pylint-guidelines-checker==0.5.2 --index-url="https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-python/pypi/simple/"
    bash -c "uv pip install --no-deps {toxinidir}/../generator/test/azure/generated/*"
    python {toxinidir}/../scripts/ci/run_pylint.py -t azure -s generated {posargs}

[testenv:lint-unbranded]
description = Run linting for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    -r {toxinidir}/requirements/lint.txt
    -e {toxinidir}/../generator
commands =
    bash -c "uv pip install --no-deps {toxinidir}/../generator/test/unbranded/generated/*"
    python {toxinidir}/../scripts/ci/run_pylint.py -t unbranded -s generated {posargs}

# =============================================================================
# Type checking environments (separate mypy and pyright)
# =============================================================================

[testenv:mypy-azure]
description = Run mypy type checking for Azure flavor
setenv =
