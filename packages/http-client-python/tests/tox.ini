# =============================================================================
# Documentation environments (apiview and sphinx split for parallelism)
# =============================================================================

[testenv:apiview-azure]
description = Run apiview validation for Azure flavor
basepython = python3.10
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_root}/requirements/docs.txt
    -e {tox_root}/../generator
commands =
    uv pip install apiview-stub-generator>=0.3.19 pylint-guidelines-checker --no-deps --index-url="https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-python/pypi/simple/"
    uv pip install astroid charset-normalizer pylint pkginfo
    python {tox_root}/install_packages.py azure {tox_root}
    python {tox_root}/../eng/scripts/ci/run_apiview.py -t azure -s generated {posargs}

[testenv:apiview-unbranded]
