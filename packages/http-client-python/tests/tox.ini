    python {toxinidir}/../scripts/ci/run_apiview.py -t unbranded -s generated {posargs}
    python {toxinidir}/../scripts/ci/run_sphinx_build.py -t unbranded -s generated {posargs}

# =============================================================================
# CI environments (combines all checks)
# =============================================================================

[testenv:ci-azure]
description = Run full CI for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {toxinidir}/requirements/lint.txt
    -r {toxinidir}/requirements/typecheck.txt
    -r {toxinidir}/requirements/azure.txt
    -e {toxinidir}/../generator
commands =
    bash -c "uv pip install --no-deps {toxinidir}/../generator/test/azure/generated/*"
    pytest mock_api/azure mock_api/shared -v
    python {toxinidir}/../scripts/ci/run_pylint.py -t azure -s generated
    python {toxinidir}/../scripts/ci/run_mypy.py -t azure -s generated
    python {toxinidir}/../scripts/ci/run_pyright.py -t azure -s generated

[testenv:ci-unbranded]
description = Run full CI for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    -r {toxinidir}/requirements/lint.txt
    -r {toxinidir}/requirements/typecheck.txt
    -r {toxinidir}/requirements/unbranded.txt
    -e {toxinidir}/../generator
commands =
    bash -c "uv pip install --no-deps {toxinidir}/../generator/test/unbranded/generated/*"
    pytest mock_api/unbranded mock_api/shared -v
    python {toxinidir}/../scripts/ci/run_pylint.py -t unbranded -s generated
    python {toxinidir}/../scripts/ci/run_mypy.py -t unbranded -s generated
    python {toxinidir}/../scripts/ci/run_pyright.py -t unbranded -s generated
