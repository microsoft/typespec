    python {toxinidir}/../scripts/ci/run_pyright.py -t unbranded -s generated {posargs}

# =============================================================================
# Documentation environments
# =============================================================================

[testenv:docs-azure]
description = Run documentation validation for Azure flavor
basepython = python3.10
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {toxinidir}/requirements/docs.txt
    -e {toxinidir}/../generator
commands =
    bash -c "uv pip install --no-deps {toxinidir}/../generator/test/azure/generated/*"
    python {toxinidir}/../scripts/ci/run_apiview.py -t azure -s generated {posargs}
    python {toxinidir}/../scripts/ci/run_sphinx_build.py -t azure -s generated {posargs}

[testenv:docs-unbranded]
description = Run documentation validation for unbranded flavor
basepython = python3.10
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
