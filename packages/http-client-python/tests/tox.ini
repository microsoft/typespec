# =============================================================================
# Documentation environments
# =============================================================================

[testenv:docs-azure]
description = Run documentation validation for Azure flavor
basepython = python3.10
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_ini_dir}/requirements/docs.txt
    -e {tox_ini_dir}/../generator
commands =
    pip install --no-deps {tox_ini_dir}/generated/azure/*
    python {tox_ini_dir}/../scripts/ci/run_apiview.py -t azure -s generated {posargs}
    python {tox_ini_dir}/../scripts/ci/run_sphinx_build.py -t azure -s generated {posargs}

