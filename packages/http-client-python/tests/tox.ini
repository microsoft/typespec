    python {tox_ini_dir}/../scripts/ci/run_sphinx_build.py -t unbranded -s generated {posargs}

# =============================================================================
# CI environments (combines all checks)
# =============================================================================

[testenv:ci-azure]
description = Run full CI for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_ini_dir}/requirements/lint.txt
    -r {tox_ini_dir}/requirements/typecheck.txt
    -r {tox_ini_dir}/requirements/azure.txt
    -e {tox_ini_dir}/../generator
commands =
    pip install --no-deps {tox_ini_dir}/generated/azure/*
    pytest mock_api/azure mock_api/shared -v
    python {tox_ini_dir}/../scripts/ci/run_pylint.py -t azure -s generated
    python {tox_ini_dir}/../scripts/ci/run_mypy.py -t azure -s generated
    python {tox_ini_dir}/../scripts/ci/run_pyright.py -t azure -s generated

