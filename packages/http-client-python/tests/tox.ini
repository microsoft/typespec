[tox]
envlist = test-{azure,unbranded}, lint-{azure,unbranded}, mypy-{azure,unbranded}, pyright-{azure,unbranded}, unittest
skipsdist = True
isolated_build = True

[testenv]
deps =
    -r {tox_ini_dir}/requirements/base.txt
setenv =
    PYTHONPATH = {tox_ini_dir}/../generator
    FLAVOR = {envname}
passenv =
    FOLDER

# =============================================================================
# Test environments
# =============================================================================

[testenv:test-azure]
description = Run tests for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    {[testenv]deps}
    -r {tox_ini_dir}/requirements/azure.txt
    -e {tox_ini_dir}/../generator
commands =
    pip install --no-deps {tox_ini_dir}/generated/azure/*
    pytest mock_api/azure mock_api/shared -v {posargs}

[testenv:test-unbranded]
description = Run tests for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    {[testenv]deps}
    -r {tox_ini_dir}/requirements/unbranded.txt
    -e {tox_ini_dir}/../generator
commands =
    pip install --no-deps {tox_ini_dir}/generated/unbranded/*
    pytest mock_api/unbranded mock_api/shared -v {posargs}

[testenv:unittest]
description = Run unit tests for pygen internals
deps =
    {[testenv]deps}
    -e {tox_ini_dir}/../generator
commands =
    pytest unit/ -v {posargs}

# =============================================================================
# Lint environments
# =============================================================================

[testenv:lint-azure]
description = Run linting for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_ini_dir}/requirements/lint.txt
    -e {tox_ini_dir}/../generator
commands =
    pip install --no-deps {tox_ini_dir}/generated/azure/*
    python {tox_ini_dir}/../scripts/ci/run_pylint.py -t azure -s generated {posargs}

[testenv:lint-unbranded]
description = Run linting for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    -r {tox_ini_dir}/requirements/lint.txt
    -e {tox_ini_dir}/../generator
commands =
    pip install --no-deps {tox_ini_dir}/generated/unbranded/*
    python {tox_ini_dir}/../scripts/ci/run_pylint.py -t unbranded -s generated {posargs}

