[tox]
envlist = test-{azure,unbranded}, check-{azure,unbranded}, docs-{azure,unbranded}, unittest
skipsdist = True
isolated_build = True
requires = tox-uv

[testenv]
deps =
    -r {tox_root}/requirements/base.txt
setenv =
    PYTHONPATH = {tox_root}/../generator
    FLAVOR = {envname}
passenv =
    FOLDER

# =============================================================================
# Test environments
# =============================================================================

[testenv:test-azure]
description = Run tests for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    {[testenv]deps}
    -r {tox_root}/requirements/azure.txt
    -e {tox_root}/../generator
commands =
    python {tox_root}/install_packages.py azure {tox_root}
    pytest mock_api/azure mock_api/shared -v -n auto {posargs}

[testenv:test-unbranded]
description = Run tests for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    {[testenv]deps}
    -r {tox_root}/requirements/unbranded.txt
    -e {tox_root}/../generator
commands =
    python {tox_root}/install_packages.py unbranded {tox_root}
    pytest mock_api/unbranded mock_api/shared -v -n auto {posargs}

[testenv:unittest]
description = Run unit tests for pygen internals
deps =
    {[testenv]deps}
    -r {tox_root}/requirements/unbranded.txt
    -e {tox_root}/../generator
commands =
    python {tox_root}/install_packages.py unbranded {tox_root}
    pytest unit/ -v -n auto {posargs}

# =============================================================================
# Lint, type checking, and static analysis environments
# Split into separate envs for maximum parallelism. Pre-built wheels make
# per-env package installs cheap (~5s instead of ~2min).
# =============================================================================

[testenv:lint-azure]
description = Run pylint for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_root}/requirements/lint.txt
    -r {tox_root}/requirements/azure.txt
    -e {tox_root}/../generator
commands =
    uv pip install azure-pylint-guidelines-checker==0.5.2 --index-url="https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-python/pypi/simple/"
    python {tox_root}/install_packages.py azure {tox_root}
    python {tox_root}/../eng/scripts/ci/run_pylint.py -t azure -s generated {posargs}

[testenv:lint-unbranded]
description = Run pylint for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    -r {tox_root}/requirements/lint.txt
    -r {tox_root}/requirements/unbranded.txt
    -e {tox_root}/../generator
commands =
    python {tox_root}/install_packages.py unbranded {tox_root}
    python {tox_root}/../eng/scripts/ci/run_pylint.py -t unbranded -s generated {posargs}

[testenv:mypy-azure]
