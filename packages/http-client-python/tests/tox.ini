    pytest mock_api/unbranded mock_api/shared -v
    python {tox_ini_dir}/../scripts/ci/run_pylint.py -t unbranded -s generated
    python {tox_ini_dir}/../scripts/ci/run_mypy.py -t unbranded -s generated
    python {tox_ini_dir}/../scripts/ci/run_pyright.py -t unbranded -s generated
