trigger:
  branches:
    include:
      - main
  paths:
    include:
      - packages/http-client-python/

pr: none

extends:
  template: /eng/common/pipelines/templates/1es-redirect.yml

  parameters:
    stages:
      - template: /eng/emitters/pipelines/templates/stages/emitter-stages.yml
        parameters:
          BuildPrereleaseVersion: true
          UseTypeSpecNext: false
          Publish: "public"
          PublishDependsOnTest: true
          PackagePath: /packages/http-client-python
          EmitterPackageJsonPath: packages/http-client-python/package.json
          Packages:
            - name: typespec-http-client-python
              file: typespec-http-client-python-*.tgz
              type: npm
          UnitTestArgs: -UnitTests
          StagePrefix: "Python"
          LanguageShortName: "python"
          CadlRanchName: "@typespec/http-client-python"
          EnableCadlRanchReport: false
          PythonVersion: "3.11"
          UploadPlaygroundBundle: true

      - stage: Python_Notify
        displayName: Python - Notify downstream
        dependsOn: Python_Publish
        condition: succeeded()
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        jobs:
          - job: DispatchRegeneration
            displayName: Trigger azure-sdk-for-python regeneration
            steps:
              - template: /eng/common/pipelines/templates/steps/login-to-github.yml
              - script: |
                  curl -f -X POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $(GH_TOKEN)" \
                    https://api.github.com/repos/Azure/azure-sdk-for-python/dispatches \
                    -d '{"event_type":"typespec-python-regenerate","client_payload":{"sha":"$(Build.SourceVersion)"}}'
                displayName: Dispatch typespec-python-regenerate
