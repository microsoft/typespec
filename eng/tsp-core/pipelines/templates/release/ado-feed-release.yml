parameters:
  - name: tag
    type: string
    default: latest
  - name: path
    type: string
  - name: registryUrl
    type: string
    default: https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-js/npm/registry/

steps:
  # Publishing the packages directly to the Azure DevOps `azure-sdk-for-js` feed bypasses the
  # upstream npmjs.org quarantine (which blocks newly released packages for 7 days) so CI can
  # consume freshly released packages immediately.
  #
  # This runs in a deployment job that does not check out sources by default, so do it explicitly to
  # get the publish script, and pin Node so it can run the TypeScript file directly.
  - checkout: self

  - task: NodeTool@0
    inputs:
      versionSpec: 24.16.0
    displayName: Install Node.js
    retryCountOnTaskFailure: 3

  - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml
    parameters:
      npmrcPath: ${{ parameters.path }}/.npmrc
      registryUrl: ${{ parameters.registryUrl }}

  # publish-npm-packages.ts skips versions that already exist in the feed (ADO immutability / present
  # in an upstream source) and fails on any other error.
  - script: node eng/tsp-core/scripts/publish-npm-packages.ts "${{ parameters.path }}" --tag ${{ parameters.tag }}
    displayName: Publish to DevOps feed (${{ parameters.tag }})
    condition: and(succeeded(), ne(variables['SkipPublishing'], 'true'))
