# Template installing all dependencies.
parameters:
  - name: nodeVersion
    type: string
    default: 24.16.0

  - name: useDotNet
    type: string
    default: false

  - name: pnpmStorePath
    type: string
    default: $(Pipeline.Workspace)/.pnpm-store

steps:
  - task: UseNode@1
    displayName: Install Node.js
    retryCountOnTaskFailure: 3
    inputs:
      version: ${{ parameters.nodeVersion }}
  - ${{ if parameters.useDotNet }}:
      - task: UseDotNet@2
        displayName: Install .NET
        inputs:
          version: 8.0.x

  - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml

  - template: /eng/common/pipelines/templates/steps/install-pnpm.yml

  - script: pnpm config set store-dir ${{ parameters.pnpmStorePath }}
    displayName: Setup pnpm cache dir

  # purge before install to ensure a clean state between retries
  - script: pnpm install
    displayName: Install JavaScript Dependencies
    retryCountOnTaskFailure: 3

  - ${{ if parameters.useDotNet }}:
      - script: dotnet restore --configfile "$(Build.SourcesDirectory)/eng/nuget.config"
        displayName: Restore .NET Dependencies
        workingDirectory: packages/typespec-vs
