name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - release/*
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.result.outputs.core }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        if: github.event_name != 'merge_group'
        id: filter
        with:
          filters: |
            core:
              - '**'
              - '!.prettierignore'
              - '!.prettierrc.json'
              - '!cspell.yaml'
              - '!eslint.config.json'
              - '!.chronus/**'
              - '!eng/emitters/**'
              - '!packages/http-client-csharp/**'
              - '!packages/http-client-java/**'
              - '!packages/http-client-python/**'

      - name: Determine changes
        id: result
        run: |
          if [[ "${{ github.event_name }}" == "merge_group" ]]; then
            echo "core=true" >> "$GITHUB_OUTPUT"
          else
            echo "core=${{ steps.filter.outputs.core }}" >> "$GITHUB_OUTPUT"
          fi

  core:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    uses: ./.github/workflows/core-ci.yml

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [core]
    steps:
      - name: Validate CI results
        run: |
          if [[ "${{ needs.core.result }}" == "failure" || "${{ needs.core.result }}" == "cancelled" ]]; then
            echo "Core CI failed"
            exit 1
          fi
          echo "All CI checks passed or were appropriately skipped"
