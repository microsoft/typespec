name: Merge release branch back into main

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - "release/*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  # Create PR
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate branch name
        id: branchname
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "branchname=backmerge/${REF_NAME}-$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      - name: Create branch
        env:
          BRANCH: ${{ steps.branchname.outputs.branchname }}
        run: |
          git checkout -b "$BRANCH"
          git push --set-upstream origin "$BRANCH"

      - name: create pull request
        id: open-pr
        uses: repo-sync/pull-request@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: ${{ steps.branchname.outputs.branchname }}
          destination_branch: ${{ github.event.repository.default_branch }}
          pr_title: "[Automated] Merge ${{ github.ref_name }} into ${{ github.event.repository.default_branch }}"
          pr_body: "Merge ${{github.ref}} back into ${{ github.event.repository.default_branch }}"
