version: 2
updates:
  # Python dependencies for http-client-python
  - package-ecosystem: "pip"
    directories:
      - "/packages/http-client-python/eng/"
      - "/packages/http-client-python/generator/test"
      - "/packages/http-client-python/generator/test/azure"
      - "/packages/http-client-python/generator/test/unbranded"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "pip prod"
      prefix-development: "pip dev"
      include: "scope"
    labels:
      - "emitter:client:python"

  # Main pnpm workspace (npm dependencies via catalog)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    exclude-paths:
      - "packages/http-client-csharp"
      - "packages/http-client-java"
      - "packages/http-client-python"
    labels: [] # conflict with our labels in labels.ts
    groups:
      alloy:
        patterns:
          - "@alloy-js/*"
      types:
        patterns:
          - "@types/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
          - "playwright"
          - "@testing-library/*"
          - "mocha"
          - "happy-dom"
          - "c8"
      linting:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
          - "cspell"
      build-tools:
        patterns:
          - "esbuild"
          - "esbuild-*"
          - "vite"
          - "vite-*"
          - "@vitejs/*"
          - "typescript"
          - "tsx"
          - "rollup-*"
      website:
        patterns:
          - "astro"
          - "astro-*"
          - "@astrojs/*"
          - "@expressive-code/*"
          - "@docsearch/*"
          - "rehype-*"
          - "remark-*"
          - "typedoc"
          - "typedoc-*"
          - "sharp"
      ui:
        patterns:
          - "react"
          - "react-*"
          - "@fluentui/*"
          - "storybook"
          - "@storybook/*"
          - "prism-react-renderer"
          - "clsx"
      vscode:
        patterns:
          - "@vscode/*"
          - "vscode-*"
      formatting:
        patterns:
          - "prettier"
          - "prettier-plugin-*"
      microsoft:
        patterns:
          - "@microsoft/*"
      chronus:
        patterns:
          - "@chronus/*"
      tree-sitter:
        patterns:
          - "tree-sitter-*"
          - "web-tree-sitter"
      octokit:
        patterns:
          - "@octokit/*"
      azure:
        patterns:
          - "@azure/*"
      yarnpkg:
        patterns:
          - "@yarnpkg/*"
      babel:
        patterns:
          - "@babel/*"
      scalar:
        patterns:
          - "@scalar/*"
      monaco:
        patterns:
          - "monaco-editor"
          - "monaco-editor-core"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    exclude-paths:
      - ".github/workflows/*.lock.{yaml,yml}"
    labels: [] # conflict with our labels in labels.ts
    groups:
      actions:
        patterns:
          - "*"
